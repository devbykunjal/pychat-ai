<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PyChat AI</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --h: 258;
  --bg: #07080f;
  --glass: rgba(12,14,28,0.72);
  --glass2: rgba(18,20,38,0.85);
  --border: rgba(120,100,255,0.18);
  --border2: rgba(120,100,255,0.32);
  --accent: hsl(var(--h),90%,65%);
  --accent2: #f05d8e;
  --accent3: #3de8d8;
  --dim: rgba(180,170,255,0.38);
  --text: #e4e0ff;
  --text2: rgba(180,170,220,0.55);
  --user-bg: rgba(90,70,200,0.18);
  --bot-bg: rgba(10,12,26,0.7);
  --r: 14px;
  --mono: 'JetBrains Mono', monospace;
  --display: 'Rajdhani', sans-serif;
  --glow: 0 0 28px rgba(120,100,255,0.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ── Animated mesh background ── */
#bg-canvas{position:fixed;inset:0;z-index:0;opacity:0.85}

/* ── Floating blobs ── */
.blob{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:drift 18s ease-in-out infinite alternate}
.blob1{width:520px;height:520px;background:radial-gradient(circle,rgba(100,80,255,0.22),transparent 70%);top:-120px;left:-80px;animation-duration:20s}
.blob2{width:400px;height:400px;background:radial-gradient(circle,rgba(240,93,142,0.14),transparent 70%);bottom:-100px;right:-60px;animation-duration:16s;animation-delay:-6s}
.blob3{width:300px;height:300px;background:radial-gradient(circle,rgba(61,232,216,0.12),transparent 70%);top:40%;left:55%;animation-duration:22s;animation-delay:-10s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,40px) scale(1.08)}100%{transform:translate(-20px,20px) scale(0.95)}}

/* ── Layout ── */
.shell{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--glass2);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);flex-shrink:0}
.logo{display:flex;align-items:center;gap:11px}
.logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 22px rgba(120,100,255,0.5);flex-shrink:0}
.logo-name{font-family:var(--display);font-size:1.35rem;font-weight:700;letter-spacing:1px}
.logo-name em{color:var(--accent);font-style:normal}
.hdr-right{display:flex;align-items:center;gap:10px}
.status-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border:1px solid var(--border);border-radius:100px;background:rgba(255,255,255,0.03);font-size:0.65rem;color:var(--text2);letter-spacing:.5px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent3);box-shadow:0 0 8px var(--accent3);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* Color picker btn */
.color-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:linear-gradient(135deg,var(--accent),var(--accent2));cursor:pointer;position:relative;overflow:hidden;flex-shrink:0;transition:transform .2s,box-shadow .2s}
.color-btn:hover{transform:scale(1.1);box-shadow:0 0 14px rgba(120,100,255,0.6)}
.color-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* ── Body row ── */
.body-row{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
aside{width:200px;flex-shrink:0;border-right:1px solid var(--border);background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:18px 12px;display:flex;flex-direction:column;gap:4px}
.sb-label{font-size:.58rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--text2);padding:0 8px;margin:10px 0 4px}
.sb-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--dim);font-family:var(--mono);font-size:.72rem;cursor:pointer;transition:all .2s;width:100%;text-align:left}
.sb-btn:hover{background:rgba(120,100,255,0.1);color:var(--text);border-color:var(--border)}
.sb-btn.active{background:rgba(120,100,255,0.2);color:var(--accent);border-color:var(--border2);box-shadow:0 0 12px rgba(120,100,255,0.15)}
.sb-btn .ico{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
.sb-sep{height:1px;background:var(--border);margin:6px 0}
.sb-spacer{flex:1}
.clear-btn{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--mono);font-size:.68rem;cursor:pointer;transition:all .2s;width:100%}
.clear-btn:hover{background:rgba(240,93,142,0.12);border-color:rgba(240,93,142,0.4);color:var(--accent2)}

/* ── Chat ── */
.chat-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:28px 28px 8px;display:flex;flex-direction:column;gap:18px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── Welcome ── */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;gap:14px;animation:fadeUp .6s ease}
.welcome-glyph{font-size:2.6rem;filter:drop-shadow(0 0 24px rgba(120,100,255,.7));animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.welcome h2{font-family:var(--display);font-size:2rem;font-weight:700;letter-spacing:.5px}
.welcome h2 span{color:var(--accent)}
.welcome p{color:var(--text2);font-size:.73rem;line-height:1.9;max-width:340px}
.chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.chip{padding:6px 14px;background:rgba(120,100,255,0.08);border:1px solid var(--border);border-radius:100px;font-size:.68rem;color:var(--dim);cursor:pointer;transition:all .2s}
.chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(120,100,255,0.15)}

/* ── Messages ── */
.msg{display:flex;align-items:flex-end;gap:10px;animation:fadeUp .3s ease;max-width:820px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.bot{align-self:flex-start}
.av{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.msg.user .av{background:linear-gradient(135deg,var(--accent2),var(--accent));box-shadow:0 0 12px rgba(240,93,142,.4)}
.msg.bot .av{background:linear-gradient(135deg,var(--accent),var(--accent3));box-shadow:0 0 12px rgba(120,100,255,.4)}
.bubble{padding:11px 15px;border-radius:var(--r);font-size:.77rem;line-height:1.75;max-width:560px;word-break:break-word;position:relative}
.msg.user .bubble{background:var(--user-bg);border:1px solid rgba(120,100,255,.28);border-bottom-right-radius:3px}
.msg.bot .bubble{background:var(--bot-bg);border:1px solid var(--border);border-bottom-left-radius:3px}
.bubble pre{background:rgba(0,0,0,.45);border:1px solid rgba(120,100,255,.2);border-radius:8px;padding:10px 13px;margin-top:8px;overflow-x:auto;font-size:.7rem;line-height:1.65}
.bubble code.inline{background:rgba(120,100,255,.15);padding:1px 5px;border-radius:4px;font-size:.85em}
.meta{font-size:.58rem;color:var(--text2);margin-top:5px;display:flex;gap:7px;align-items:center}
.msg.user .meta{justify-content:flex-end}
.tag{padding:2px 7px;border-radius:4px;background:rgba(120,100,255,.1);color:var(--accent);border:1px solid rgba(120,100,255,.22);font-size:.56rem;letter-spacing:.5px;text-transform:uppercase}
.tag.voice{background:rgba(61,232,216,.08);color:var(--accent3);border-color:rgba(61,232,216,.22)}
.tag.img{background:rgba(240,93,142,.08);color:var(--accent2);border-color:rgba(240,93,142,.22)}
.tag.err{background:rgba(255,60,60,.08);color:#ff6b6b;border-color:rgba(255,60,60,.22)}

/* ── Typing indicator ── */
.typing-ind{display:flex;gap:5px;align-items:center;padding:13px 16px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:bounce .9s infinite}
.dot:nth-child(2){animation-delay:.15s;background:var(--accent2)}
.dot:nth-child(3){animation-delay:.3s;background:var(--accent3)}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

/* ── Cursor blink for typewriter ── */
.cursor{display:inline-block;width:2px;height:1em;background:var(--accent);vertical-align:text-bottom;animation:cur .7s infinite}
@keyframes cur{0%,49%{opacity:1}50%,100%{opacity:0}}

/* ── Image preview ── */
#img-preview{display:none;align-items:center;gap:10px;padding:8px 12px;background:var(--glass2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;font-size:.7rem;color:var(--text2)}
#img-preview img{width:42px;height:42px;object-fit:cover;border-radius:6px;border:1px solid var(--border2)}
#img-preview .rm{margin-left:auto;background:none;border:none;color:var(--accent2);cursor:pointer;font-size:.95rem;padding:0 4px;transition:opacity .2s}
#img-preview .rm:hover{opacity:.7}
#img-preview .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Input zone ── */
.input-zone{border-top:1px solid var(--border);padding:14px 24px 18px;background:rgba(7,8,15,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0}
.mode-strip{display:flex;gap:5px;margin-bottom:10px}
.strip-tag{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:.62rem;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--mono)}
.strip-tag.on{background:rgba(120,100,255,.15);border-color:var(--border2);color:var(--accent)}
.input-row{display:flex;gap:9px;align-items:flex-end}
.action-btns{display:flex;gap:6px}
.icn-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;flex-shrink:0}
.icn-btn:hover{background:rgba(120,100,255,.12);color:var(--text);border-color:var(--border2);box-shadow:var(--glow)}
.icn-btn.mic-on{background:rgba(240,93,142,.15);border-color:var(--accent2);color:var(--accent2);animation:mic-pulse 1s infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(240,93,142,.35)}50%{box-shadow:0 0 0 7px rgba(240,93,142,0)}}
#txt{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:11px 15px;color:var(--text);font-family:var(--mono);font-size:.78rem;resize:none;outline:none;transition:border-color .2s,box-shadow .2s;max-height:140px;line-height:1.55;min-height:42px}
#txt::placeholder{color:var(--text2)}
#txt:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(120,100,255,.12),var(--glow)}
.send-btn{width:42px;height:42px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s;flex-shrink:0;box-shadow:0 4px 20px rgba(120,100,255,.4);font-weight:700}
.send-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(120,100,255,.55)}
.send-btn:active{transform:translateY(1px)}
.send-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
#file-in{display:none}

/* ── Toast ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--glass2);border:1px solid var(--border2);border-radius:10px;padding:9px 20px;font-size:.72rem;color:var(--dim);opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;backdrop-filter:blur(12px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Responsive ── */
@media(max-width:650px){
  aside{display:none}
  .messages{padding:16px 14px 8px}
  .input-zone{padding:12px 14px 16px}
  .bubble{max-width:calc(100vw - 80px)}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="shell">
  <header>
    <div class="logo">
      <div class="logo-mark">🤖</div>
      <div class="logo-name">Py<em>Chat</em> AI</div>
    </div>
    <div class="hdr-right">
      <div class="status-badge">
        <div class="status-dot"></div>
        GPT-3.5 · OpenRouter
      </div>
      <div class="color-btn" title="Pick accent color">
        <input type="color" id="color-pick" value="#7c6af7" title="Pick accent color"/>
      </div>
    </div>
  </header>

  <div class="body-row">
    <aside>
      <div class="sb-label">Input Mode</div>
      <button class="sb-btn active" id="sb-text" onclick="setMode('text')"><span class="ico">⌨️</span>Text Chat</button>
      <button class="sb-btn" id="sb-mic" onclick="setMode('mic')"><span class="ico">🎙️</span>Microphone</button>
      <button class="sb-btn" id="sb-ocr" onclick="setMode('ocr')"><span class="ico">🖼️</span>Image → Text</button>
      <div class="sb-sep"></div>
      <div class="sb-label">History</div>
      <button class="sb-btn" onclick="downloadHistory()"><span class="ico">💾</span>Save Chat</button>
      <div class="sb-spacer"></div>
      <button class="clear-btn" onclick="clearChat()">🗑️ Clear Chat</button>
    </aside>

    <div class="chat-col">
      <div class="messages" id="msgs">
        <div class="welcome" id="welcome">
          <div class="welcome-glyph">✦</div>
          <h2>Hello — I'm <span>PyChat AI</span></h2>
          <p>Ask me anything. Type a message, speak with your mic, or upload an image for OCR text extraction and summary.</p>
          <div class="chips">
            <div class="chip" onclick="quickSend('What can you do?')">What can you do?</div>
            <div class="chip" onclick="quickSend('Explain quantum computing simply')">Quantum computing</div>
            <div class="chip" onclick="quickSend('Write a Python hello world')">Python hello world</div>
            <div class="chip" onclick="quickSend('Tell me a fun fact')">Fun fact</div>
          </div>
        </div>
      </div>

      <div class="input-zone">
        <div class="mode-strip">
          <button class="strip-tag on" id="st-text" onclick="setMode('text')">⌨️ Text</button>
          <button class="strip-tag" id="st-mic" onclick="setMode('mic')">🎙️ Voice</button>
          <button class="strip-tag" id="st-ocr" onclick="setMode('ocr')">🖼️ OCR</button>
        </div>
        <div id="img-preview">
          <img id="pv-img" src="" alt="preview"/>
          <span class="fname" id="pv-name"></span>
          <button class="rm" onclick="removeImg()">✕</button>
        </div>
        <div class="input-row">
          <div class="action-btns">
            <button class="icn-btn" id="mic-btn" title="Voice input" onclick="toggleMic()">🎙️</button>
            <label class="icn-btn" title="Upload image" for="file-in">🖼️</label>
            <input type="file" id="file-in" accept="image/png,image/jpeg,image/gif,image/webp" onchange="handleImg(event)"/>
          </div>
          <textarea id="txt" rows="1" placeholder="Type a message…" onkeydown="handleKey(event)" oninput="autoH(this)"></textarea>
          <button class="send-btn" id="send" onclick="sendMsg()" title="Send">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════
   CONFIG
══════════════════════════════════════ */
const API_KEY = "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";
const API_URL = "https://openrouter.ai/api/v1/chat/completions";

/* ══════════════════════════════════════
   ANIMATED MESH BACKGROUND (canvas)
══════════════════════════════════════ */
(function(){
  const cv = document.getElementById('bg-canvas');
  const ctx = cv.getContext('2d');
  let W, H, pts;

  function resize(){
    W = cv.width = window.innerWidth;
    H = cv.height = window.innerHeight;
    initPts();
  }

  function initPts(){
    pts = Array.from({length:55},()=>({
      x: Math.random()*W,
      y: Math.random()*H,
      vx: (Math.random()-.5)*.4,
      vy: (Math.random()-.5)*.4,
      r: Math.random()*1.5+.5
    }));
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // draw lines
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<140){
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(120,100,255,${.14*(1-dist/140)})`;
          ctx.lineWidth=.6;
          ctx.stroke();
        }
      }
    }
    // draw dots
    for(const p of pts){
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(140,120,255,0.5)';
      ctx.fill();
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize',resize);
  resize(); draw();
})();

/* ══════════════════════════════════════
   COLOR PICKER
══════════════════════════════════════ */
(function(){
  const pick = document.getElementById('color-pick');
  const saved = localStorage.getItem('pychat_accent');
  if(saved){ pick.value=saved; applyAccent(saved); }
  pick.addEventListener('input', e=>{ applyAccent(e.target.value); localStorage.setItem('pychat_accent',e.target.value); });
})();

function applyAccent(hex){
  // Convert hex to hsl
  let r=parseInt(hex.slice(1,3),16)/255;
  let g=parseInt(hex.slice(3,5),16)/255;
  let b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0}else{
    const d=max-min; s=l>.5?d/(2-max-min):d/(max+min);
    if(max===r) h=((g-b)/d+(g<b?6:0))/6;
    else if(max===g) h=((b-r)/d+2)/6;
    else h=((r-g)/d+4)/6;
    h=Math.round(h*360);
  }
  document.documentElement.style.setProperty('--h',h);
  document.documentElement.style.setProperty('--accent',hex);
}

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let mode = 'text';
let imgB64 = null, imgName = '';
let history = [];
let histLog = [];
let busy = false;
let recog = null, micOn = false;

/* ══════════════════════════════════════
   MODE
══════════════════════════════════════ */
function setMode(m){
  mode = m;
  ['text','mic','ocr'].forEach(k=>{
    document.getElementById('sb-'+k).classList.toggle('active',k===m);
    document.getElementById('st-'+k).classList.toggle('on',k===m);
  });
  const ph={text:'Type a message…',mic:'Click 🎙️ to start speaking…',ocr:'Upload an image, then add context here…'};
  document.getElementById('txt').placeholder = ph[m];
}

/* ══════════════════════════════════════
   TEXTAREA AUTO-RESIZE
══════════════════════════════════════ */
function autoH(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,140)+'px';
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}

function quickSend(t){
  document.getElementById('txt').value=t;
  sendMsg();
}

/* ══════════════════════════════════════
   IMAGE UPLOAD
══════════════════════════════════════ */
function handleImg(e){
  const file = e.target.files[0];
  if(!file) return;
  const allowed=['image/png','image/jpeg','image/gif','image/webp'];
  if(!allowed.includes(file.type)){toast('⚠️ Please upload a PNG, JPG, GIF, or WEBP image.');return;}
  if(file.size > 10*1024*1024){toast('⚠️ Image too large (max 10 MB).');return;}
  imgName = file.name;
  const rd = new FileReader();
  rd.onload = ev=>{
    imgB64 = ev.target.result.split(',')[1];
    document.getElementById('pv-img').src = ev.target.result;
    document.getElementById('pv-name').textContent = file.name;
    document.getElementById('img-preview').style.display = 'flex';
    setMode('ocr');
    toast('Image loaded — it will be sent with your next message.');
  };
  rd.onerror = ()=>toast('⚠️ Failed to read image file.');
  rd.readAsDataURL(file);
}

function removeImg(){
  imgB64=null; imgName='';
  document.getElementById('img-preview').style.display='none';
  document.getElementById('file-in').value='';
  document.getElementById('pv-img').src='';
  setMode('text');
}

/* ══════════════════════════════════════
   MICROPHONE
══════════════════════════════════════ */
function toggleMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){toast('Speech recognition not supported in this browser.');return;}
  if(micOn){recog&&recog.stop();return;}
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  recog = new SR();
  recog.lang='en-US'; recog.interimResults=false;
  recog.onstart=()=>{
    micOn=true;
    document.getElementById('mic-btn').classList.add('mic-on');
    toast('Listening…');
  };
  recog.onresult=ev=>{
    const t=ev.results[0][0].transcript;
    const el=document.getElementById('txt');
    el.value=t; autoH(el);
  };
  recog.onend=()=>{
    micOn=false;
    document.getElementById('mic-btn').classList.remove('mic-on');
  };
  recog.onerror=()=>{
    micOn=false;
    document.getElementById('mic-btn').classList.remove('mic-on');
    toast('Mic error — check permissions.');
  };
  recog.start(); setMode('mic');
}

/* ══════════════════════════════════════
   SEND MESSAGE
══════════════════════════════════════ */
async function sendMsg(){
  if(busy) return;
  const inp = document.getElementById('txt');
  const txt = inp.value.trim();
  if(!txt&&!imgB64) return;

  const welcome = document.getElementById('welcome');
  if(welcome) welcome.remove();

  const userTxt = txt||(imgB64?'(Image uploaded for OCR summary)':'');
  inp.value=''; inp.style.height='auto';

  let content, tagType=null;
  if(mode==='mic') tagType='voice';
  else if(imgB64) tagType='img';

  if(imgB64){
    content=[
      {type:'image_url',image_url:{url:`data:image/jpeg;base64,${imgB64}`}},
      {type:'text',text:txt||'Please extract all text from this image and provide a comprehensive summary.'}
    ];
    removeImg();
  } else {
    content = userTxt;
  }

  addMsg('user',userTxt,tagType);
  const typingEl = addTyping();
  busy=true;
  document.getElementById('send').disabled=true;

  history.push({role:'user',content});
  const trimmed = history.slice(-10);

  try{
    const res = await fetch(API_URL,{
      method:'POST',
      headers:{'Authorization':`Bearer ${API_KEY}`,'Content-Type':'application/json'},
      body:JSON.stringify({model:'openai/gpt-4o-mini',max_tokens:1024,messages:trimmed})
    });
    const data = await res.json();
    typingEl.remove();

    if(data.choices&&data.choices[0]){
      const reply = data.choices[0].message.content;
      history.push({role:'assistant',content:reply});
      addMsg('bot',reply,null,true);
      saveLog(userTxt,reply);
    } else {
      addMsg('bot','⚠️ API Error: '+(data.error?.message||JSON.stringify(data)),'err');
    }
  } catch(err){
    typingEl.remove();
    addMsg('bot','⚠️ Network error: '+err.message,'err');
  }

  busy=false;
  document.getElementById('send').disabled=false;
}

/* ══════════════════════════════════════
   RENDER MESSAGES
══════════════════════════════════════ */
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatBubble(text){
  return escHtml(text)
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code class="inline">$1</code>')
    .replace(/\n/g,'<br>');
}

function addMsg(role, text, tag, typewrite=false){
  const msgs = document.getElementById('msgs');
  const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const tagHtml = tag ? `<span class="tag ${tag==='voice'?'voice':tag==='img'?'img':tag==='err'?'err':''}">${tag}</span>` : '';

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubbleId = 'b'+Date.now();
  div.innerHTML = `
    <div class="av">${role==='user'?'👤':'🤖'}</div>
    <div>
      <div class="bubble" id="${bubbleId}"></div>
      <div class="meta">${tagHtml}${time}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;

  const bub = document.getElementById(bubbleId);
  if(typewrite && role==='bot'){
    typeWriter(bub, text, msgs);
  } else {
    bub.innerHTML = formatBubble(text);
  }
  return div;
}

function typeWriter(el, text, scroller){
  // Render plain text char-by-char, then format once done
  let i = 0;
  const raw = text;

  // Add cursor
  const curEl = document.createElement('span');
  curEl.className='cursor';
  el.appendChild(curEl);

  const timer = setInterval(()=>{
    if(i < raw.length){
      // Insert text before cursor
      const node = document.createTextNode(raw[i]);
      el.insertBefore(node,curEl);
      i++;
      scroller.scrollTop = scroller.scrollHeight;
    } else {
      clearInterval(timer);
      curEl.remove();
      // Now properly format
      el.innerHTML = formatBubble(raw);
      scroller.scrollTop = scroller.scrollHeight;
    }
  }, 12);
}

function addTyping(){
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="av">🤖</div>
    <div class="bubble" style="background:var(--bot-bg);border:1px solid var(--border);border-bottom-left-radius:3px">
      <div class="typing-ind"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <div style="font-size:.65rem;color:var(--text2);margin-top:4px;padding:0 2px">PyChat AI is typing…</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

/* ══════════════════════════════════════
   HISTORY / CLEAR
══════════════════════════════════════ */
function saveLog(u,b){
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  histLog.push(`[${t}] You: ${u}`, `[${t}] PyChat AI: ${b}`, '');
}

function downloadHistory(){
  if(!histLog.length){toast('No chat history to save.');return;}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([histLog.join('\n')],{type:'text/plain'}));
  a.download='chat_history.txt'; a.click();
  toast('Chat history saved!');
}

function clearChat(){
  history=[]; histLog=[];
  document.getElementById('msgs').innerHTML=`
    <div class="welcome" id="welcome">
      <div class="welcome-glyph">✦</div>
      <h2>Hello — I'm <span>PyChat AI</span></h2>
      <p>Ask me anything. Type a message, speak with your mic, or upload an image for OCR text extraction and summary.</p>
      <div class="chips">
        <div class="chip" onclick="quickSend('What can you do?')">What can you do?</div>
        <div class="chip" onclick="quickSend('Explain quantum computing simply')">Quantum computing</div>
        <div class="chip" onclick="quickSend('Write a Python hello world')">Python hello world</div>
        <div class="chip" onclick="quickSend('Tell me a fun fact')">Fun fact</div>
      </div>
    </div>`;
  toast('Chat cleared.');
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

document.getElementById('txt').focus();
</script>
